name: Sync Template Changes

on:
  # Run automatically every week (Sunday at midnight)
  schedule:
    - cron: '0 0 * * 0'
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout downstream repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync changes from Template
        uses: AndreasAugustin/actions-template-sync@v2
        with:
          source_repo_path: bucsai/ansible-dev-template
          upstream_branch: main
          pr_labels: template-sync
