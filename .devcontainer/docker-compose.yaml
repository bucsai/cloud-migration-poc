services:
  ansible:
    build:
      context: .
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    privileged: true
    devices:
      - "/dev/fuse:/dev/fuse"
    volumes:
      - ..:/workspaces/ansible:cached
      - /var/run/docker.sock:/var/run/docker.sock:z
    depends_on:
      - ara

  ara:
    image: quay.io/recordsansible/ara-api:latest
    ports:
      - "8000:8000"
    environment:
      ARA_ALLOWED_HOSTS: "['*']"
    volumes:
      - ara_data:/opt/ara

volumes:
  ara_data:
