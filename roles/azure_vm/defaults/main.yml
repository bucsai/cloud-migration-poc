---
azure_vm_config:
  # Global Deployment settings
  location: "{{ azure_common.location }}"
  resource_group: "rg-{{ azure_resource_base }}"

  # Storage Configuration
  storage_account:
    name: "st{{ azure_resource_base_regional | replace('-', '') | replace('_', '') }}"
    type: Standard_LRS
    kind: StorageV2

  # Network Infrastructure Configuration
  network:
    vnet:
      name: "vnet-{{ azure_resource_base_regional }}"
      cidr: 10.0.0.0/16
    subnet:
      name: "snet-{{ azure_resource_base_regional }}"
      cidr: 10.0.1.0/24
    nsg_name: "nsg-{{ azure_resource_base_regional }}"
    public_ip_name: "pip-{{ azure_resource_base_regional }}"
    nic_name: "nic-{{ azure_resource_base_regional }}"

  # VM Spec and Credentials
  vm:
    name: "vm-{{ azure_resource_base }}"
    size: Standard_B2ats_v2
    os_type: Windows
    image:
      offer: WindowsServer
      publisher: MicrosoftWindowsServer
      sku: 2022-Datacenter-smalldisk
      version: latest
    admin:
      username: ansible
      password: !vault |
                $ANSIBLE_VAULT;1.1;AES256
                34643664343937653337346666303063623630393635333635616265303861376335653261333465
                3935363261373936323036346437393236636563353639660a326138656231623064323766316130
                39353163323636316531393139643661633938396135616332346633316130323064623464383933
                3834636534646231320a633032373936653638383765636637653262336131653632616237623835
                33616361653831333033666364636365383230343566633635333932613361303535
