---
- name: Get local public IP for NSG whitelisting
  ansible.builtin.uri:
    url: https://api.ipify.org?format=json
    method: GET
  register: azure_vm_inbound_ip

- name: Ensure Resource Group exists
  azure.azcollection.azure_rm_resourcegroup:
    name: "{{ azure_vm_config.resource_group }}"
    location: "{{ azure_vm_config.location }}"
    state: present

- name: Ensure Storage Account exists
  azure.azcollection.azure_rm_storageaccount:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.storage_account.name }}"
    account_type: "{{ azure_vm_config.storage_account.type }}"
    kind: "{{ azure_vm_config.storage_account.kind }}"
    location: "{{ azure_vm_config.location }}"
    state: present

- name: Ensure Virtual Network exists
  azure.azcollection.azure_rm_virtualnetwork:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.network.vnet.name }}"
    address_prefixes: "{{ azure_vm_config.network.vnet.cidr }}"

- name: Ensure Subnet exists
  azure.azcollection.azure_rm_subnet:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.network.subnet.name }}"
    address_prefix: "{{ azure_vm_config.network.subnet.cidr }}"
    virtual_network: "{{ azure_vm_config.network.vnet.name }}"

- name: Ensure Network Security Group exists with rules to allow WinRM and RDP from local IP
  azure.azcollection.azure_rm_securitygroup:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.network.nsg_name }}"
    rules:
      - name: AllowWinRM
        protocol: Tcp
        destination_port_range: 5986
        access: Allow
        priority: 1001
        direction: Inbound
        source_address_prefix: "{{ azure_vm_inbound_ip.json.ip }}"
      - name: AllowRDP
        protocol: Tcp
        destination_port_range: 3389
        access: Allow
        priority: 1002
        direction: Inbound
        source_address_prefix: "{{ azure_vm_inbound_ip.json.ip }}"

- name: Ensure Public IP exists
  azure.azcollection.azure_rm_publicipaddress:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.network.public_ip_name }}"
    sku: Standard
    allocation_method: Static
  register: azure_vm_public_ip

- name: Ensure NIC exists and is attached to the subnet, NSG, and public IP
  azure.azcollection.azure_rm_networkinterface:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.network.nic_name }}"
    virtual_network: "{{ azure_vm_config.network.vnet.name }}"
    subnet_name: "{{ azure_vm_config.network.subnet.name }}"
    security_group: "{{ azure_vm_config.network.nsg_name }}"
    ip_configurations:
      - name: "ipconfig1"
        public_ip_address_name: "{{ azure_vm_config.network.public_ip_name }}"
        primary: true

- name: Ensure VM exists and is attached to the NIC
  azure.azcollection.azure_rm_virtualmachine:
    resource_group: "{{ azure_vm_config.resource_group }}"
    name: "{{ azure_vm_config.vm.name }}"
    vm_size: "{{ azure_vm_config.vm.size }}"
    admin_username: "{{ azure_vm_config.vm.admin.username }}"
    admin_password: "{{ azure_vm_config.vm.admin.password }}"
    network_interfaces: "{{ azure_vm_config.network.nic_name }}"
    os_type: "{{ azure_vm_config.vm.os_type }}"
    image: "{{ azure_vm_config.vm.image }}"
    storage_account_name: "{{ azure_vm_config.storage_account.name }}"
    boot_diagnostics:
      enabled: true
    state: present
    started: true

- name: Ensure Custom Script Extension is installed to configure WinRM for Ansible
  azure.azcollection.azure_rm_virtualmachineextension:
    name: winrm-extension
    resource_group: "{{ azure_vm_config.resource_group }}"
    virtual_machine_name: "{{ azure_vm_config.vm.name }}"
    publisher: Microsoft.Compute
    virtual_machine_extension_type: CustomScriptExtension
    type_handler_version: '1.9'
    settings:
      fileUris:
        - "https://raw.githubusercontent.com/ansible/ansible-documentation/devel/examples/scripts/ConfigureRemotingForAnsible.ps1"
      commandToExecute: "powershell -ExecutionPolicy Unrestricted -File ConfigureRemotingForAnsible.ps1"
    auto_upgrade_minor_version: true

- name: Ensure WinRM is available before proceeding
  ansible.builtin.wait_for:
    host: "{{ azure_vm_public_ip.state.ip_address }}"
    port: 5986
    state: started
    delay: 30      # Give Windows a head start
    timeout: 600   # 10 minutes (CustomScript can be slow)

- name: Add VM to inventory
  ansible.builtin.add_host:
    hostname: "{{ azure_vm_public_ip.state.ip_address }}"
    ansible_user: "{{ azure_vm_config.vm.admin.username }}"
    ansible_password: "{{ azure_vm_config.vm.admin.password }}"
    ansible_connection: winrm
    ansible_port: 5986
    ansible_winrm_server_cert_validation: ignore
    ansible_winrm_transport: ntlm

- name: Ping the VM
  ansible.windows.win_ping:
  delegate_to: "{{ azure_vm_public_ip.state.ip_address }}"
